<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חדר מעלה עמוס</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-mortarboard"></i> חדר מעלה עמוס</span>
    <span class="text-white-50" id="user-info">לא מחובר</span>
  </div>
</nav>

<div class="container">
  <div id="page-login">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 mt-5">
          <h3 class="text-center mb-4">כניסה למערכת</h3>
          <div class="mb-3">
            <label class="form-label">שם משתמש</label>
            <input id="username" class="form-control" placeholder="admin" autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label">סיסמה</label>
            <input id="password" type="password" class="form-control" autocomplete="current-password">
          </div>
          <button id="login-btn" class="btn btn-primary w-100">כניסה</button>
          <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-home" class="d-none">
    <div class="row g-3 mt-2">
      <div class="col-md-6 col-lg-3">
        <div class="card card-tile" onclick="goto('students')">
          <i class="bi bi-people fs-1 text-primary"></i>
          <h5 class="mt-2">תלמידים</h5>
          <p class="text-muted small mb-0">ניהול רשימת תלמידים</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card card-tile" onclick="goto('behavior')">
          <i class="bi bi-clipboard-check fs-1 text-success"></i>
          <h5 class="mt-2">מעקב התנהגות</h5>
          <p class="text-muted small mb-0">תיעוד אירועים</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card card-tile" onclick="goto('settings')">
          <i class="bi bi-gear fs-1 text-secondary"></i>
          <h5 class="mt-2">הגדרות</h5>
          <p class="text-muted small mb-0">משתמשים והרשאות</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card card-tile" onclick="goto('reports')">
          <i class="bi bi-file-earmark-pdf fs-1 text-danger"></i>
          <h5 class="mt-2">דוחות</h5>
          <p class="text-muted small mb-0">ייצוא PDF מעוצב</p>
        </div>
      </div>
    </div>

    <div class="card p-3 mt-4">
      <h6><i class="bi bi-graph-up"></i> סטטיסטיקה</h6>
      <div class="row text-center mb-3">
        <div class="col-3">
          <div class="display-6 text-primary" id="stat-students">0</div>
          <div class="text-muted small">תלמידים</div>
        </div>
        <div class="col-3">
          <div class="display-6 text-info" id="stat-events">0</div>
          <div class="text-muted small">אירועים</div>
        </div>
        <div class="col-3">
          <div class="display-6 text-warning" id="stat-week">0</div>
          <div class="text-muted small">השבוע</div>
        </div>
        <div class="col-3">
          <div class="display-6 text-danger" id="stat-high">0</div>
          <div class="text-muted small">חומרה גבוהה</div>
        </div>
      </div>
      <canvas id="trend-chart" style="max-height:140px"></canvas>
    </div>
    <div class="card p-3 mt-3">
      <h6><i class="bi bi-clock-history"></i> פעילות אחרונה</h6>
      <div id="recent-activity"></div>
    </div>
  </div>

  <div id="page-students" class="d-none"></div>
  <div id="page-behavior" class="d-none"></div>
  <div id="page-settings" class="d-none"></div>
  <div id="page-reports" class="d-none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/students.js"></script>
<script src="js/behavior.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
