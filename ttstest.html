<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>בדיקת TTS</title>
<style>body{font-family:system-ui,Arial;padding:20px;max-width:700px;margin:auto;line-height:1.6}
#out{white-space:pre-wrap;background:#f4f4f4;border:1px solid #ccc;border-radius:8px;padding:12px;direction:ltr;text-align:left;font-family:monospace;font-size:13px}
.ok{color:#137a3f;font-weight:bold}.err{color:#c0392b;font-weight:bold}</style></head>
<body>
<h2>בדיקת יצירת קול (TTS) — עצמאי</h2>
<p>עמוד זה מריץ את אותה קריאה בדיוק שהפאנל עושה, ומציג את התוצאה המדויקת.</p>
<button id="go" style="font-size:16px;padding:8px 16px">הרץ בדיקה</button>
<audio id="au" controls style="display:none;width:100%;margin-top:10px"></audio>
<h3>פלט:</h3><div id="out">לחצו "הרץ בדיקה"…</div>
<script>
const K_ENC='GxMgOwkjGRMRACscEhgsIygdEhgoERMNbBAMbmxiHR0ANmwRLGgD';
function defaultKey(){try{const b=atob(K_ENC);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b.charCodeAt(i)^0x5A);return s;}catch(_){return'';}}
function log(m,cls){const o=document.getElementById('out');o.innerHTML+=(cls?'<span class="'+cls+'">'+m+'</span>':m)+'\n';}
function pcmB64ToWav(b64,rate){const bin=atob(b64),n=bin.length,buf=new ArrayBuffer(44+n),dv=new DataView(buf);
const wr=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
wr(0,'RIFF');dv.setUint32(4,36+n,true);wr(8,'WAVE');wr(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);
dv.setUint32(24,rate,true);dv.setUint32(28,rate*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);wr(36,'data');dv.setUint32(40,n,true);
for(let i=0;i<n;i++)dv.setUint8(44+i,bin.charCodeAt(i));return new Blob([buf],{type:'audio/wav'});}
async function run(){
  const o=document.getElementById('out');o.innerHTML='';
  const key=defaultKey();
  log('origin: '+location.origin);
  log('מפתח מפוענח: '+(key.slice(0,6)+'…'+key.slice(-4))+' ('+key.length+' תווים)');
  if(!/^AIza/.test(key)){log('✗ פענוח המפתח נכשל','err');return;}
  const body={contents:[{parts:[{text:'קרא בקול רגוע: שלום, בדיקת מערכת'}]}],generationConfig:{responseModalities:['AUDIO'],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:'Charon'}}}}};
  log('שולח בקשה ל-Gemini…');
  try{
    const t0=Date.now();
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key='+encodeURIComponent(key),
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    log('status: '+r.status+'  ('+(Date.now()-t0)+'ms)');
    const j=await r.json().catch(e=>({_parse_err:String(e)}));
    if(!r.ok){log('✗ שגיאת API: '+JSON.stringify(j.error||j).slice(0,300),'err');return;}
    const inl=j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts&&j.candidates[0].content.parts[0]&&j.candidates[0].content.parts[0].inlineData;
    if(!inl||!inl.data){log('✗ אין אודיו בתשובה: '+JSON.stringify(j).slice(0,300),'err');return;}
    let rate=24000;const m=(inl.mimeType||'').match(/rate=(\d+)/);if(m)rate=parseInt(m[1]);
    const blob=pcmB64ToWav(inl.data,rate);
    const au=document.getElementById('au');au.src=URL.createObjectURL(blob);au.style.display='';
    log('✓ הצליח! נוצר קול '+Math.round(blob.size/1024)+'KB, mime='+inl.mimeType,'ok');
  }catch(e){log('✗ EXCEPTION (כנראה CORS/רשת): '+e.name+' — '+e.message,'err');}
}
document.getElementById('go').addEventListener('click',run);
run();
</script></body></html>
